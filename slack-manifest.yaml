_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Slack2GTask
features:
  bot_user:
    display_name: Slack2GTask
    always_online: true
oauth_config:
  scopes:
    bot:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
    user:
      - stars:read
settings:
  event_subscriptions:
    request_url: https://your-app.vercel.app/api/slack/events
    user_events:
      - star_added
  socket_mode_enabled: false
  interactivity:
    is_enabled: true
